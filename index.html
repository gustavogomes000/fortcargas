<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>Fort Cargas — Emissor de Pedidos & Recibos</title>
    <meta name="description" content="Gerador de Pedidos de Carregamento e Recibos da Fort Cargas" />
    <meta name="author" content="Fort Cargas" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fort Cargas" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload Google Fonts: non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Montserrat:wght@800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Montserrat:wght@800;900&display=swap" /></noscript>

    <meta property="og:title" content="SETPOLITIC — Sistema Eleitoral Goiano" />
    <meta property="og:description" content="Plataforma de inteligência eleitoral de Goiás" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.4s ease-out;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        color: #0d2818;
        margin-bottom: 1.5rem;
        letter-spacing: -0.01em;
      }
      #splash-logo span { color: #2e7d22; }
      .splash-bar {
        width: 200px;
        height: 3px;
        background: #e2edd5;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .splash-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #0284c7, #38bdf8);
        border-radius: 4px;
        animation: splash-progress 1.8s ease-in-out infinite;
        transform-origin: left;
      }
      @keyframes splash-progress {
        0% { transform: scaleX(0) translateX(0); }
        50% { transform: scaleX(0.6) translateX(30%); }
        100% { transform: scaleX(0) translateX(100%); }
      }
      .splash-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.6rem;
        font-weight: 600;
        color: #3b5a3e;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-top: -1rem;
        margin-bottom: 1.5rem;
      }
      .splash-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.75rem;
        color: #557758;
        margin-top: 1rem;
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <!-- Fort Cargas Pure CSS Premium Icon -->
      <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #0284c7, #0369a1); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.25); border: 2px solid #ffffff;">
        <span style="color: #ffffff; font-family: 'Montserrat', 'Inter', sans-serif; font-weight: 900; font-size: 1.9rem; line-height: 1; transform: translateY(-1px);">F</span>
      </div>
      <div id="splash-logo">FORT<span>CARGAS</span></div>
      <div class="splash-subtitle">Agência de Cargas</div>
      <div class="splash-bar"></div>
      <div class="splash-text">Carregando o emissor...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback timeout to guarantee splash screen is removed after maximum 1.5 seconds under all conditions -->
    <script>
      setTimeout(function() {
        var el = document.getElementById('splash-screen');
        if (el) {
          el.classList.add('hide');
          setTimeout(function() { el.remove(); }, 500);
        }
      }, 1500);
    </script>
  </body>
</html>
